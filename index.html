    <script>
        (function() {
            var path = window.location.pathname;
            
            // 0. Redirección de URLs antiguas de Blogger (e.g., /2012/10/testimonio-de-funky.html)
            var bloggerMatch = path.match(/^\/\d{4}\/\d{2}\/(.+)\.html$/);
            if (bloggerMatch && bloggerMatch[1]) {
                var search = window.location.search || '';
                var hash = window.location.hash || '';
                window.location.replace('/#/post/' + bloggerMatch[1] + search + hash);
                return;
            }

            // 1. Redireccionar rutas limpias del servidor a rutas con Hash (#) para compatibilidad con SPA/HashRouter
            if (!path.startsWith('/api') && !path.includes('.') && path !== '/') {
                if (path.startsWith('/post/') || path.startsWith('/link/') || path.startsWith('/bio') || path.startsWith('/admin')) {
                    var search = window.location.search || '';
                    var hash = window.location.hash || '';
                    window.location.replace('/#' + path + search + hash);
                    return; // Detener ejecución ya que estamos redireccionando
                }
            }

            // 2. Redirección de PWA
            var isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            var currentPath = window.location.pathname + window.location.hash;
            
            if (isPWA && !currentPath.includes('/admin')) {
                console.log('PWA DETECTADA - REDIRIGIENDO AL PANEL');
                window.location.replace('/#/admin?pwa=final_v4');
            }
        })();
    </script>

    <script>
      (function() {
        function trackView() {
          var ANALYTICS_URL = "https://script.google.com/macros/s/AKfycbwNX-T5wawLrYaTnJ0PcN_xA8sp0LIXThDA3jqkDhR3IdjSlnqRif8rUEx_e9e1xSsd3Q/exec";
          
          var payload = {
            action: "trackEvent",
            event: "post_view", 
            data: { 
              title: document.title,
              artist: "Externa" 
            },
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent
          };

          fetch(ANALYTICS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload)
          }).catch(function(e) {
            console.log("Analytics Error:", e);
          });
        }

        if (document.readyState === "complete" || document.readyState === "interactive") {
          trackView();
        } else {
          window.addEventListener('load', trackView);
        }
      })();
    </script>

    <script>
        // MASTER RESET SCRIPT (v4.9.5)
        const APP_VERSION = '4.9.5';
        if (localStorage.getItem('app_version') !== APP_VERSION || window.location.search.includes('reset')) {
            console.log('🧹 Versión antigua detectada o Reset manual. Limpiando caché...');
            localStorage.setItem('app_version', APP_VERSION);
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) { registration.unregister(); }
                });
            }
            if (window.caches) {
                caches.keys().then(function(names) {
                    for (let name of names) caches.delete(name);
                });
            }
            setTimeout(() => { window.location.reload(true); }, 500);
        }
    </script>
