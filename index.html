    <script>
        // MASTER RESET SCRIPT (v2.0.4)
        if (window.location.search.includes('reset') || window.location.search.includes('v=4')) {
            console.log('🧹 Iniciando Limpieza Total de Caché...');
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) { registration.unregister(); }
                });
            }
            if (window.caches) {
                caches.keys().then(function(names) {
                    for (let name of names) caches.delete(name);
                });
            }
            // Eliminar parámetros para no entrar en bucle y recargar
            setTimeout(() => {
                window.location.href = window.location.pathname + window.location.hash;
            }, 1000);
        }
    </script>
