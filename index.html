<body class="flex flex-col">
    <script>
        // MASTER RESET SCRIPT (v2.0.4)
        if (window.location.search.includes('reset') || window.location.search.includes('v=4')) {
            console.log('🧹 Iniciando Limpieza Total de Caché...');
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) { registration.unregister(); }
                });
            }
            if (window.caches) {
                caches.keys().then(function(names) {
                    for (let name of names) caches.delete(name);
                });
            }
            // Eliminar parámetros para no entrar en bucle y recargar
            setTimeout(() => {
                window.location.href = window.location.pathname + window.location.hash;
            }, 1000);
        }
    </script>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
<script>
    window.deferredPWAEvent = null;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPWAEvent = e;
        // Dispatch custom event to notify React components
        window.dispatchEvent(new CustomEvent('pwa-ready'));
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.error('SW register error:', err));
        });
    }
</script>
